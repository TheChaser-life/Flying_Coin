name: 2. Build services container, Test and Push to registry

on:
  push:
    branches:
     - dev

jobs:
  Build-Test-Push:
    runs-on: ubuntu-latest

    permissions:
        contents: read
        id-token: write

    env:
        ARTIFACT_REGISTRY: ${{ secrets.REGISTRY }}/${{ secrets.PROJECT_ID }}/${{ secrets.REPOSITORY }}
        TAG: staging
    
    steps:
      - name: clone_code
        uses: actions/checkout@v4
    
      - name: build_and_health_check
        run: | 
          docker compose -f docker_compose_for_testing/docker-compose.yml up -d
          
          echo "Waiting for services to be healthy..."
          # Đợi tối đa 120s cho các service ổn định
          for i in {1..24}; do
            echo "Attempt $i: Checking health endpoints..."
            COMPLETED=true
            for port in 8000 8001 8002 8003 8004 8005 8006; do
              if ! curl -s --fail http://localhost:$port/health; then
                echo "Service on port $port is NOT healthy yet."
                COMPLETED=false
              else
                echo "Service on port $port is HEALTHY."
              fi
            done
            if [ "$COMPLETED" = true ]; then
              echo "All services are healthy!"
              break
            fi
            sleep 5
          done
          
          if [ "$COMPLETED" = false ]; then
            echo "Timeout reached. Some services are still unhealthy."
            docker compose -f docker_compose_for_testing/docker-compose.yml logs
            exit 1
          fi

          docker compose -f docker_compose_for_testing/docker-compose.yml ps

      - name: authentication with google
        uses: google-github-actions/auth@v2
        id: auth
        with:
          service_account: ${{ secrets.CICD_SA_EMAIL }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          token_format: 'access_token'

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Push images to Artifact Registry
        run: docker compose -f docker_compose_for_testing/docker-compose.yml push collectors forecast-service sentiment-service market-data-service backtesting-service portfolio-service websocket-service
