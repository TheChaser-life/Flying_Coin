name: 2. Build services container, Test and Push to registry

on:
  push:
    branches:
     - dev

jobs:
  Build-Test-Push:
    runs-on: ubuntu-latest

    permissions:
        contents: read
        id-token: write

    env:
        ARTIFACT_REGISTRY: ${{ secrets.REGISTRY }}/${{ secrets.PROJECT_ID }}/${{ secrets.REPOSITORY }}
        TAG: staging
    
    steps:
      - name: clone_code
        uses: actions/checkout@v4
    
      - name: build_and_health_check
        run: | 
          docker compose -f docker_compose_for_testing/docker-compose.yml up -d
          
          # echo "Waiting for notification-service to be healthy..."
          # # Đợi tối đa 60s cho service ổn định
          # for i in {1..12}; do
          #   if curl -s --fail http://localhost:8007/health; then
          #     echo "Notification Service is healthy!"
          #     break
          #   fi
          #   echo "Attempt $i: Service is NOT healthy yet..."
          #   if [ $i -eq 12 ]; then
          #     echo "Timeout reached. Showing logs:"
          #     docker compose -f docker_compose_for_testing/docker-compose.yml logs notification-service
          #     exit 1
          #   fi
          #   sleep 5
          # done

          echo "Waiting for services to be healthy..."
          declare -A services=( [8000]="collectors" [8001]="forecast-service" [8002]="sentiment-service" [8003]="market-data-service" [8004]="backtesting-service" [8005]="portfolio-service" [8006]="websocket-service" )
          
          # Đợi tối đa 120s cho các service ổn định
          for i in {1..24}; do
            echo "Attempt $i: Checking health endpoints..."
            COMPLETED=true
            for port in 8000 8001 8002 8003 8004 8005 8006; do
              if ! curl -s --fail http://localhost:$port/health; then
                # Only print "not healthy" message every few attempts to avoid spam
                if [ $((i % 4)) -eq 0 ] || [ $i -eq 24 ]; then
                  echo "Service ${services[$port]} (port $port) is NOT healthy yet."
                fi
                COMPLETED=false
              fi
            done
            if [ "$COMPLETED" = true ]; then
              echo "All services are healthy!"
              break
            fi
            sleep 5
          done
          
          if [ "$COMPLETED" = false ]; then
            echo "Timeout reached. Logging only unhealthy services (last 50 lines):"
            for port in 8000 8001 8002 8003 8004 8005 8006; do
              if ! curl -s --fail http://localhost:$port/health; then
                service_name=${services[$port]}
                echo "--------------------------------------------------------"
                echo "Logs for UNHEALTHY service: $service_name"
                echo "--------------------------------------------------------"
                docker compose -f docker_compose_for_testing/docker-compose.yml logs --tail=50 $service_name
              fi
            done
            exit 1
          fi

          docker compose -f docker_compose_for_testing/docker-compose.yml ps
      - name: Install Trivy CLI
        run: |
            sudo apt-get install wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
            sudo apt-get update && sudo apt-get install trivy
  
      - name: Scan multiple images
        run: |
            IMAGES=("${{ env.ARTIFACT_REGISTRY }}/collectors:${{ env.TAG }}" \
                    "${{ env.ARTIFACT_REGISTRY }}/forecast-service:${{ env.TAG }}" \
                    "${{ env.ARTIFACT_REGISTRY }}/sentiment-service:${{ env.TAG }}" \
                    "${{ env.ARTIFACT_REGISTRY }}/market-data-service:${{ env.TAG }}" \
                    "${{ env.ARTIFACT_REGISTRY }}/backtesting-service:${{ env.TAG }}" \
                    "${{ env.ARTIFACT_REGISTRY }}/portfolio-service:${{ env.TAG }}" \
                    "${{ env.ARTIFACT_REGISTRY }}/websocket-service:${{ env.TAG }}" \
                    "${{ env.ARTIFACT_REGISTRY }}/notification-service:${{ env.TAG }}")
            
            for img in "${IMAGES[@]}"; do
              echo "Scanning image: $img"
              trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed $img
            done
          
      - name: authentication with google
        uses: google-github-actions/auth@v2
        id: auth
        with:
          service_account: ${{ secrets.CICD_SA_EMAIL }}
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          token_format: 'access_token'

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      # - name: Push images to Artifact Registry
      #   run: |
      #     docker compose -f docker_compose_for_testing/docker-compose.yml push notification-service
          # docker compose -f docker_compose_for_testing/docker-compose.yml push collectors forecast-service sentiment-service market-data-service backtesting-service portfolio-service websocket-service notification-service
