services:
  rabbitmq:
    image: rabbitmq:alpine
    ports:
      - "5672:5672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  collectors:
    build:
      context: ..
      dockerfile: services/collectors/Dockerfile
    # THÊM DÒNG NÀY ĐỂ PUSH:
    image: ${ARTIFACT_REGISTRY}/collectors:${TAG}
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
  
  forecast-service:
    build:
      context: ..
      dockerfile: services/forecast-service/Dockerfile
    # THÊM DÒNG NÀY ĐỂ PUSH:
    image: ${ARTIFACT_REGISTRY}/forecast-service:${TAG}
    ports:
      - "8001:8000"
  
  sentiment-service:
    build:
      context: ..
      dockerfile: services/sentiment-service/Dockerfile
    # THÊM DÒNG NÀY ĐỂ PUSH:
    image: ${ARTIFACT_REGISTRY}/sentiment-service:${TAG}
    ports:
      - "8002:8002"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - REDIS_URL=redis://redis:6379
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  market-data-service:
    build:
      context: ..
      dockerfile: services/market-data-service/Dockerfile
    # THÊM DÒNG NÀY ĐỂ PUSH:
    image: ${ARTIFACT_REGISTRY}/market-data-service:${TAG}
    ports:
      - "8003:8001"
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  backtesting-service:
    build:
      context: ..
      dockerfile: services/backtesting-service
    image: ${ARTIFACT_REGISTRY}/backtesting-service:${TAG}
    ports: 
      - "8004:8000"
    
