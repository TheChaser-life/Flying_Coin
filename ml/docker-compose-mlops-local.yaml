version: "3.8"
networks:
  mlops:
    driver: bridge

services:
  airflow-db:
    image: postgres:15-alpine
    networks:
      - mlops
    ports:
      - "5433:5432"
    environment: # user để airflow kết nối đến DB và tạo thêm 1 user nữa là admin để login vào airflow ui
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  airflow-init:
    image: apache/airflow:2.10.0
    networks:
      - mlops
    command: > # tạo schema trong postgres
      bash -c "
      airflow db init && 
      airflow users create -u admin -p admin -f Admin -l User -r Admin -e admin@local.dev
      "
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor # chạy song song các task trên 1 máy
      # kết nối đến DB để lưu trữ metadata của airflow    
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    depends_on:
      airflow-db:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.10.0
    networks:
      - mlops
    command: webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor # chạy song song các task trên 1 máy
                                             # CeleryExecutor: chạy song song các task trên nhiều máy
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow # Địa chỉ kết nối đến DB
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__WEBSERVER__SECRET_KEY: "airflow-local-secret-key"
      AIRFLOW_WWW_USER_USERNAME: admin
      AIRFLOW_WWW_USER_PASSWORD: admin
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./outputs:/opt/airflow/outputs

  airflow-scheduler:
    image: apache/airflow:2.10.0
    networks:
      - mlops
    command: bash -c "pip install mlflow boto3 && airflow scheduler" # cài đặt mlflow và boto3 (cho S3/GCS/...) để airflow có thể kết nối đến MLflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__WEBSERVER__SECRET_KEY: "airflow-local-secret-key"
      AIRFLOW_WWW_USER_USERNAME: admin
      AIRFLOW_WWW_USER_PASSWORD: admin
      MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./outputs:/opt/airflow/outputs

  mlflow-db:
    image: postgres:15-alpine
    networks:
      - mlops
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.19.0
    networks:
      - mlops
    command: >
      bash -c "pip install psycopg2-binary --quiet &&
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@mlflow-db:5432/mlflow
      --default-artifact-root file:///mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/artifacts
    depends_on:
      mlflow-db:
        condition: service_healthy
    restart: unless-stopped


