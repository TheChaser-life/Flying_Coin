# 1. Declare the secret synchronization from GCP Secret Manager to K8s
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sync-postgres-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: postgresql-credentials
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: postgres-password
    - secretKey: replication-password
      remoteRef:
        key: postgres-password # Re-using the same password for replication if needed, or check if there is a specific one.

