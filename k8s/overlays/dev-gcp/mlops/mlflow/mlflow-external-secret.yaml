apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mlflow-secret-sync
  namespace: mlops
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: mlflow-secret
    creationPolicy: Owner
    template:
      data:
        # trim loại bỏ \r\n từ GCP secret — tránh database "mlflow\r" does not exist
        MLFLOW_BACKEND_STORE_URI: "{{ .uri | toString | trim }}"
  data:
    - secretKey: uri
      remoteRef:
        key: mlflow-backend-uri
