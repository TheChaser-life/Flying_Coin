apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mlflow-secret-sync
  namespace: mlops
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: mlflow-secret
    creationPolicy: Owner
  data:
    # Full PostgreSQL connection string (mlflow user on Cloud SQL or self-hosted)
    - secretKey: MLFLOW_BACKEND_STORE_URI
      remoteRef:
        key: mlflow-backend-uri
