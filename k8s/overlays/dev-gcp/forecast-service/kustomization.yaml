apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev

resources:
  - ../../../base/forecast-service
  - database-external-secret.yaml

images:
  - name: forecast-service
    newName: asia-southeast1-docker.pkg.dev/flying-coin-489803/flying-coin-docker/forecast-service
    newTag: staging

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: forecast-service-deployment
    spec:
      template:
        spec:
          containers:
            - name: forecast-service
              envFrom:
                - secretRef:
                    name: forecast-db-config
              env:
                - name: MLFLOW_TRACKING_URI
                  value: "http://mlflow-tracking-svc.mlops.svc.cluster.local:80"
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "1"
                  memory: "4Gi"
              livenessProbe:
                initialDelaySeconds: 60
                timeoutSeconds: 10
              readinessProbe:
                initialDelaySeconds: 30
                timeoutSeconds: 10
