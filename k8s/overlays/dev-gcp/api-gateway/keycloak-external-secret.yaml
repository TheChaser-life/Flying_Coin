# ExternalSecret tự động tạo Secret "keycloak-jwt-credential" bằng cách sync từ GCP Secret Manager.
# Yêu cầu: External Secrets Operator (ESO) đã được cài trên cluster.
#
# Các giá trị cần tạo trên GCP Secret Manager:
#   gcloud secrets create keycloak-jwt-credential --replication-policy=automatic
#   gcloud secrets versions add keycloak-jwt-credential --data-file=- <<EOF
#   {
#     "kongCredType": "jwt",
#     "algorithm": "RS256",
#     "key": "https://keycloak.flying-coin.internal/realms/flying-coin",
#     "rsa_public_key": "-----BEGIN PUBLIC KEY-----\n...\n-----END PUBLIC KEY-----"
#   }
#   EOF
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-jwt-sync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-storage      # ClusterSecretStore dùng Workload Identity
    kind: ClusterSecretStore
  target:
    name: keycloak-jwt-credential   # Tên Secret phải khớp với credentials[] trong KongConsumer
    creationPolicy: Owner
    template:
      metadata:
        labels:
          konghq.com/credential: jwt
  dataFrom:
    - extract:
        key: keycloak-jwt-credential  # Tên secret trên GCP Secret Manager
