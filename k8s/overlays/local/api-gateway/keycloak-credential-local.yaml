# JWT credential cho local/Minikube.
# rsa_public_key là PUBLIC key — không phải secret thật, an toàn để commit vào git.
# Lấy từ: Invoke-RestMethod "http://localhost:8080/auth/realms/flying-coin" | Select -Expand public_key
# Sau đó bọc bằng PEM header: -----BEGIN PUBLIC KEY----- / -----END PUBLIC KEY-----
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-jwt-credential
  labels:
    konghq.com/credential: jwt
stringData:
  kongCredType: jwt
  algorithm: RS256
  # Phải khớp CHÍNH XÁC với claim "iss" trong JWT token do Keycloak phát hành
  key: "http://keycloak.local/auth/realms/flying-coin"
  rsa_public_key: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAoqdd5pUPI//FhAVuufpc
