# Sync rabbitmq-password từ GCP Secret Manager → K8s Secret "rabbitmq-credentials"
# Helm chart rabbitmq-gcp.yaml dùng existingPasswordSecret: "rabbitmq-credentials"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sync-rabbitmq-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: rabbitmq-credentials
    creationPolicy: Owner
  data:
    - secretKey: rabbitmq-password
      remoteRef:
        key: rabbitmq-password

---
# Sync rabbitmq-erlang-cookie từ GCP Secret Manager → K8s Secret "rabbitmq-erlang-secret"
# Helm chart rabbitmq-gcp.yaml dùng existingErlangSecret: "rabbitmq-erlang-secret"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sync-rabbitmq-erlang-secret
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: rabbitmq-erlang-secret
    creationPolicy: Owner
  data:
    - secretKey: rabbitmq-erlang-cookie
      remoteRef:
        key: rabbitmq-erlang-cookie
