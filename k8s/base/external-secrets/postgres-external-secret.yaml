# Sync postgres-password từ GCP Secret Manager → K8s Secret "postgresql-credentials"
# Helm chart postgres-gcp.yaml dùng existingSecret: "postgresql-credentials"
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sync-postgres-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: postgresql-credentials
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: postgres-password
    - secretKey: replication-password
      remoteRef:
        key: postgres-password
