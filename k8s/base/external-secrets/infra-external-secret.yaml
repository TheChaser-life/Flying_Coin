# ExternalSecret chung cho các credentials infrastructure (RabbitMQ, Redis)
# Sync từ GCP Secret Manager → K8s Secret "infra-credentials"
# Các service cần RABBITMQ_URL, REDIS_URL sẽ reference secret này
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: infra-credentials-sync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-storage
    kind: ClusterSecretStore
  target:
    name: infra-credentials
    creationPolicy: Owner
    template:
      data:
        RABBITMQ_URL: "{{ .rabbitmq_url }}"
        REDIS_URL: "{{ .redis_url }}"
  data:
    - secretKey: rabbitmq_url
      remoteRef:
        key: rabbitmq-url
    - secretKey: redis_url
      remoteRef:
        key: redis-url
