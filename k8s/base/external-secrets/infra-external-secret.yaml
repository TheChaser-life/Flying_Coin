# ExternalSecret chung cho các credentials infrastructure (RabbitMQ, Redis)
# Sync từ GCP Secret Manager → K8s Secret "infra-credentials"
# Các service cần RABBITMQ_URL, REDIS_URL sẽ reference secret này
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: infra-credentials-sync
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-storage
    kind: ClusterSecretStore
  target:
    name: infra-credentials
    creationPolicy: Owner
    template:
      data:
        RABBITMQ_URL: "{{ .rabbitmq_url | toString | trim }}"
        REDIS_URL: "{{ .redis_url | toString | trim }}"
        DATABASE_URL: "{{ .database_url | toString | trim }}"
        NEWSAPI_KEY: "{{ .newsapi_key | toString | trim }}"
  data:
    - secretKey: rabbitmq_url
      remoteRef:
        key: rabbitmq-url
    - secretKey: redis_url
      remoteRef:
        key: redis-url
    - secretKey: database_url
      remoteRef:
        key: market-data-db-url
    - secretKey: newsapi_key
      remoteRef:
        key: newsapi-key
