apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-secrets
  namespace: mlops
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: airflow-secrets
    creationPolicy: Owner
    template:
      data:
        # trim loại bỏ \r\n, space — GCP secret có thể có trailing newline
        connection: "postgresql://airflow:{{ .db_password | toString | trim }}@postgres-postgresql-primary.database.svc.cluster.local:5432/airflow"
        admin-password: "{{ .admin_password | toString | trim }}"
        # Chart expects api-secret-key, webserver-secret-key (Flask session)
        "api-secret-key": "{{ .session_secret_key | toString | trim }}"
        "webserver-secret-key": "{{ .session_secret_key | toString | trim }}"
        # Chart expects jwt-secret (API auth JWT) — một số component dùng jwt_secret
        "jwt-secret": "{{ .jwt_secret_key | toString | trim }}"
        "jwt_secret": "{{ .jwt_secret_key | toString | trim }}"
  data:
    - secretKey: db_password
      remoteRef:
        key: airflow-db-password
    - secretKey: admin_password
      remoteRef:
        key: airflow-admin-password
    - secretKey: session_secret_key
      remoteRef:
        key: airflow-session-secret-key
    - secretKey: jwt_secret_key
      remoteRef:
        key: airflow-jwt-secret-key
