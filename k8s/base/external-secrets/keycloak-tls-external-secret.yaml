apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-tls-sync
  namespace: auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: keycloak.thinhopsops.win-tls
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ .cloudflare_cert }}"
        tls.key: "{{ .cloudflare_key }}"
  data:
    - secretKey: cloudflare_cert
      remoteRef:
        key: kong-cloudflare-cert
    - secretKey: cloudflare_key
      remoteRef:
        key: kong-cloudflare-key
