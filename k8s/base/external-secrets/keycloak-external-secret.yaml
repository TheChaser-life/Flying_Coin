apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sync-keycloak-credentials
  namespace: auth
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: keycloak-credentials
    creationPolicy: Owner
  data:
    - secretKey: keycloak-password
      remoteRef:
        key: keycloak-password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sync-keycloak-postgres-credentials
  namespace: auth
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-storage
  target:
    name: keycloak-postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: keycloak-postgres-password
      remoteRef:
        key: keycloak-postgres-password

