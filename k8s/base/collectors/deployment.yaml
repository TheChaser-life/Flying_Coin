apiVersion: apps/v1
kind: Deployment
metadata:
  name: collectors-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collectors
  template:
    metadata:
      labels:
        app: collectors
    spec:
      containers:
        - name: collectors
          image: collectors
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - secretRef:
                name: infra-credentials
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
