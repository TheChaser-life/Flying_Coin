apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentiment-service
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
      labels:
        app: sentiment-service
    spec:
      containers:
        - name: sentiment-service
          image: sentiment-service
          ports:
            - containerPort: 8002
          envFrom:
            - secretRef:
                name: infra-credentials
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 60
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: "1536Mi"
            limits:
              cpu: "1000m"
              memory: "2048Mi"

        
      
