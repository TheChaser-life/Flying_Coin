apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio-service
  template:
    metadata:
      labels:
        app: portfolio-service
    spec:
      containers:
      - name: portfolio-service
        image: portfolio-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: url
        - name: REDIS_URL
          value: "redis://redis-master.database.svc.cluster.local:6379/0"
        - name: MARKET_DATA_SERVICE_URL
          value: "http://market-data-service.dev.svc.cluster.local:8000"
