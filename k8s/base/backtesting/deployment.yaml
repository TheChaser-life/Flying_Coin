apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtesting-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backtesting-service
  template:
    metadata:
      labels:
        app: backtesting-service
    spec:
      containers:
      - name: backtesting-service
        image: backtesting-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: MARKET_DATA_SERVICE_URL
          value: "http://market-data-service.dev.svc.cluster.local:8000"
