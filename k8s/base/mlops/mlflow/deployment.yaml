apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-tracking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-tracking
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
      labels:
        app: mlflow-tracking
    spec:
      containers:
        - name: mlflow-tracking
          image: ghcr.io/mlflow/mlflow:v2.19.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --no-cache-dir psycopg2-binary boto3 google-cloud-storage && \
              mlflow server \
                --host 0.0.0.0 \
                --port 5000 \
                --backend-store-uri "${MLFLOW_BACKEND_STORE_URI}" \
                --serve-artifacts \
                --artifacts-destination "${MLFLOW_ARTIFACTS_DESTINATION}" \
                --gunicorn-opts "--workers 1"
          envFrom:
            - configMapRef:
                name: mlflow-config
            - secretRef:
                name: mlflow-secret
          ports:
            - name: http
              containerPort: 5000
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          # pip install ~60s + mlflow startup ~20s — tăng delay tránh probe kill sớm
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 90
            periodSeconds: 5
