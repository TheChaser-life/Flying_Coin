apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-bastion
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh-bastion
  template:
    metadata:
      labels:
        app: ssh-bastion
    spec:
      containers:
      - name: sshd
        image: linuxserver/openssh-server:latest
        ports:
        - containerPort: 2222
          name: ssh
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Asia/Ho_Chi_Minh"
        - name: USER_NAME
          value: "mldev"
        - name: PUBLIC_KEY
          valueFrom:
            secretKeyRef:
              name: ssh-bastion-keys
              key: public_key
        - name: PORT
          value: "2222"
        volumeMounts:
        - name: init-scripts
          mountPath: /custom-cont-init.d/fix-sshd.sh
          subPath: fix-sshd.sh
        - name: host-keys
          mountPath: /ssh_host_keys_mount
          readOnly: true
      volumes:
      - name: init-scripts
        configMap:
          name: ssh-bastion-init
          defaultMode: 0755
      - name: host-keys
        secret:
          secretName: ssh-bastion-host-keys
          defaultMode: 384
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssh-bastion-init
  namespace: mlops
data:
  fix-sshd.sh: |
    #!/bin/bash
    echo "Configuring sshd for Port Forwarding and GatewayPorts..."
    CONF_FILE="/config/sshd/sshd_config"
    if [ -f "$CONF_FILE" ]; then
        sed -i 's/^AllowTcpForwarding.*/AllowTcpForwarding yes/' "$CONF_FILE"
        sed -i 's/^GatewayPorts.*/GatewayPorts yes/' "$CONF_FILE"
        echo "sshd_config updated successfully."
    else
        echo "Warning: $CONF_FILE not found, skipping sshd config update."
    fi

    echo "Syncing persistent host keys from Secret mount..."
    mkdir -p /config/ssh_host_keys
    # Copy keys from mount (handling symlinks from Secret)
    cp -L /ssh_host_keys_mount/ssh_host_* /config/ssh_host_keys/
    chmod 600 /config/ssh_host_keys/ssh_host_*
    # Identify actual user (usually 1000/mldev in this image)
    chown -R mldev:users /config/ssh_host_keys/
    echo "Host keys sync completed. Restarting sshd to apply changes..."
    pkill sshd || true
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-bastion-svc
  namespace: mlops
spec:
  type: LoadBalancer
  ports:
  - port: 2222
    targetPort: 2222
    name: ssh
  - port: 8765
    targetPort: 8765
    name: training-tunnel
  selector:
    app: ssh-bastion
